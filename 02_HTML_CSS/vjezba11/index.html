<!doctype html>
<html class="no-js" lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RWD Foundation</title>
  <link rel="stylesheet" href="css/foundation.css">
  <link rel="stylesheet" href="css/app.css">
</head>

<body>

  <div class="grid-container">
    <!-- Početak izbornik -->
    <div class="title-bar" data-responsive-toggle="example-menu" data-hide-for="medium">
      <button class="menu-icon" type="button" data-toggle></button>
      <div class="title-bar-title">Edunova</div>
    </div>

    <div class="top-bar" id="example-menu">
      <div class="top-bar-left">
        <ul class="dropdown menu" data-dropdown-menu>
          <li class="menu-text">Edunova</li>
          <li class="has-submenu">
            <a href="#0">Tehnologije</a>
            <ul class="submenu menu vertical" data-submenu>
              <li><a href="#0">GIT</a></li>
              <li><a href="#0">HTML &amp; CSS</a></li>
              <li><a href="#0">RWD</a></li>
              <li><a href="#0">JS</a></li>
            </ul>
          </li>
          <li><a href="#0">Završni rad</a></li>
        </ul>
      </div>
    </div>
    <!-- Kraj izbornik -->

    <!-- Počinje grid -->
    <div class="grid-x">
      <div style="background-color: blue;" class="large-4 medium-6 cell">A</div>
      <div style="background-color: green;" class="large-8 medium-6 cell">B</div>
      <div style="background-color: red;" class="large-6 cell">C</div>
      <div style="background-color: purple;" class="large-6 cell">D</div>
      <div style="background-color: aquamarine;" class="large-7 medium-2 small-8 cell">E</div>
    </div>
    <!-- Kraj grid -->

    <!-- Zadatak -->
    <div class="grid-x">
      <div style="background-color: brown;" class="large-4 show-for-large-only cell">A</div>
      <div style="background-color: yellow;" class="large-8 hide-for-small-only cell">B</div>
      <div style="background-color: violet;" class="cell">C</div>
      <div style="background-color: chartreuse;" class="large-4 medium-6 cell">D</div>
      <div style="background-color: goldenrod;" class="large-4 medium-6 cell">E</div>
      <div style="background-color: orange;" class="large-4 cell">F</div>
      <div style="background-color: blue;" class="large-6 medium-6 cell">G</div>
      <div style="background-color: green;"class="large-6 medium-6 hide-for-small-only cell">H</div>
    </div>
    <!-- Kraj zadatka -->

  </div>


  <script src="js/vendor/jquery.js"></script>
  <script src="js/vendor/what-input.js"></script>
  <script src="js/vendor/foundation.js"></script>
  <script src="js/app.js"></script>


</body>

</html>
