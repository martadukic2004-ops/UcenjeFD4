<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt FPV akademije</title>
  <link rel="stylesheet" href="../css/foundation.css">
  <link rel="stylesheet" href="../css/app.css">
</head>

<body>

  <div class="grid-container">

    <!-- Početak navigacije -->
    <div class="title-bar" data-responsive-toggle="example-menu" data-hide-for="medium">
      <button class="menu-icon" type="button" data-toggle></button>
      <div class="title-bar-title">FPV akademija</div>
    </div>

    <div class="top-bar" id="example-menu">
      <div class="top-bar-left">
        <ul class="dropdown menu" data-dropdown-menu>
          <li class="menu-text">FPV AKADEMIJA</li>
          <li><a href="../index.html">Početna</a></li>
          <li class="has-submenu">
            <a href="program.html">Program</a>
            <ul class="submenu menu vertical" data-submenu>
              <li><a href="vrste.html">Vrste dronova</a></li>
              <li><a href="simulatori.html">Simulatori</a></li>
              <li><a href="elektronika.html">Elektronika</a></li>
            </ul>
          </li>
          <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
      </div>
    </div>
    <!-- Završetak navigacije -->

    <div class="callout primary">
      <h3>Prijave na FPV Akademiju</h3>
      <p>Ispunite obrazac i postanite dio FPV Akademije.</p>
    </div>

    <!-- Početak forme -->
    <form>
      <label>Ime i prezime
        <input type="text" placeholder="Pero Perić" aria-describedby="exampleHelpText">
      </label>
      <label>E-mail adresa
        <input type="text" placeholder="pero.peric@gmail.com" aria-describedby="exampleHelpText">
      </label>
      <label> Broj mobitela
        <textarea placeholder="npr. +385123456789"></textarea>
      </label>
      <label> Zašto želite upisati akademiju?
        <textarea placeholder="Želim pilotirati dronove"></textarea>
      </label>
      <label> Razina iskustva
        <select>
          <option value="početnik">Početnik</option>
          <option value="imam malo iskustva">Imam malo iskustva</option>
          <option value="iskusni korisnik">Iskusni korisnik</option>
        </select>
      </label>
      <input id="formCheckbox1" type="checkbox"><label for="formCheckbox1">Prihvaćam uvjete korištenja</label>
      <br>
      <button type="button" class="success button" style="background-color: black; color: white;">Prijavi se!</button>
    </form>
    <!-- Završetak forme -->

  </div>


  <script src="../js/vendor/jquery.js"></script>
  <script src="../js/vendor/what-input.js"></script>
  <script src="../js/vendor/foundation.js"></script>
  <script src="../js/app.js"></script>

</body>

</html>
