<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablice i forme</title> 
    <link rel="stylesheet" href="style.css">
</head>
<body>

<table>

    <caption>
        Pantone boje godine
    </caption>

    <colgroup>
        <col style="width: 10%;">
        <col style="width: 70%;">
        <col style="width: 20%;">
    </colgroup>

    <thead>
        <tr>
            <th>Godina</th>
            <th>Ime boje</th>
            <th>HEX</th>
        </tr>
    </thead>

<tbody>
    <tr>
        <td>2026</td>
        <td>Cloud dancer</td>
        <td>#f0f1f0</td>
    </tr>
    <tr>
        <td>2025</td>
        <td>Mocha Mousse</td>
        <td>#a47864</td>
    </tr>
    <tr>
        <td>2024</td>
        <td>Peach fuzz</td>
        <td>#ffd98</td>
    </tr>
</tbody>

<tfoot>
    <tr>
        <td colspan="2">Spojene kolone</td>
        <td rowspan="2">Spojeni redovi</td>
    </tr>
    <tr>
        <td>1</td>
        <td>2</td>
    </tr>
</tfoot>
</table>
    
<hr>

<form action="https://origo.hr" method="get">
    <fieldset>
        <legend>Podaci o osiguraniku</legend>

        <input type="text" name="ime" id="ime" placeholder="Unesite svoje ime">

        <hr>

        <input type="radio" name="nacin" id="online" value="online">
        <label for="online">Online</label>

        <br>

        <input type="radio" name="nacin" id="neposredno" value="neposredno">
        <label for="neposredno">Uživo</label>

        <hr>

        <input type="password" name="lozinka" id="lozinka" placeholder="Unesite lozinku">

        <hr>

        <input type="month" name="mjesec" id="mjesec">

        <select name="mjesec" id="mjesec">
            <option value="1">Siječanj</option>
            <option value="2">Veljača</option>
            <option value="3">Ožujak</option>
            <option value="4">Travanj</option>
            <option value="5">Svibanj</option>
            <option value="6">Lipanj</option>
            <option value="7">Srpanj</option>
            <option value="8">Kolovoz</option>
            <option value="9">Rujan</option>
            <option value="10">Listopad</option>
            <option value="11">Studeni</option>
            <option value="12">Prosinac</option>
        </select>

        <hr>

        <textarea name="poruka" id="poruka" cols="30" rows="10"></textarea>

        <hr>

        <button>Predaj</button>

    </fieldset>
</form>

</body>
</html>
